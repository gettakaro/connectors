name: PR Build Cleanup

# When a PR closes (merged or not), delete its disposable pr-<num>-<connector>
# pre-releases and tags. No path filter — runs on every close so nothing is left behind.
on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Fork PRs never published a build (no secrets), so there's nothing to clean up — and
    # skipping them keeps the App-token generation below from running without its secrets.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Delete builds as takaro-ci-bot[bot], consistent with how they were published.
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ secrets.TAKARO_CI_APP_ID }}
          private-key: ${{ secrets.TAKARO_CI_APP_PRIV_KEY }}

      - name: Delete per-PR builds
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: scripts/cleanup-pr-builds.sh "$PR_NUMBER"
