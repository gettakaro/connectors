name: Valheim Connector

on:
  push:
    branches: [main]
    paths: ['valheim/**', 'scripts/**', '.github/workflows/valheim.yml']
  pull_request:
    paths: ['valheim/**', 'scripts/**', '.github/workflows/valheim.yml']
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !inputs.tag }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: valheim
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore Takaro.Valheim.sln
      - name: Test reference-free connector projects
        run: dotnet test Takaro.Valheim.sln --no-restore -v minimal

  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate token
        id: app-token
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.TAKARO_CI_APP_ID }}
          private-key: ${{ secrets.TAKARO_CI_APP_PRIV_KEY }}

      - name: Set up .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          dotnet-version: 8.0.x

      - name: Install system dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y lib32gcc-s1 jq unzip

      - name: Cache Valheim build dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        id: valheim-cache
        with:
          path: |
            valheim/_data/server/valheim_server_Data/Managed
            valheim/_data/deps
            valheim/_data/steamcmd
          key: valheim-build-deps-v1

      - name: Make scripts executable
        run: chmod +x valheim/scripts/*.sh scripts/*.sh

      - name: Set up environment
        run: valheim/scripts/setup-environment.sh

      - name: Restore
        run: dotnet restore valheim/Takaro.Valheim.sln

      - name: Resolve release params
        id: params
        env:
          EVENT: ${{ github.event_name }}
          IN_VERSION: ${{ inputs.version }}
          IN_TAG: ${{ inputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEV_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/release-params.sh valheim >> "$GITHUB_OUTPUT"

      - name: Build release artifact
        run: valheim/scripts/build-release.sh "${{ steps.params.outputs.version }}" "$RUNNER_TEMP/dist"

      - name: Publish stable release assets
        if: ${{ steps.params.outputs.publish == 'stable' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/publish-release.sh upload "${{ steps.params.outputs.tag }}" "$RUNNER_TEMP/dist/takaro-valheim-plugin.zip"

      - name: Publish rolling dev build
        if: ${{ steps.params.outputs.publish == 'rolling' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/publish-release.sh rolling valheim-dev \
            "Valheim Connector - latest dev build" \
            "Rolling development build (\`${{ steps.params.outputs.version }}\`), updated on every push to main. Not for production." \
            "$RUNNER_TEMP/dist/takaro-valheim-plugin.zip"

      - name: Publish PR build
        if: ${{ steps.params.outputs.publish == 'pr' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/publish-release.sh rolling "${{ steps.params.outputs.tag }}" \
            "Valheim Connector - build for PR #${{ github.event.pull_request.number }}" \
            "Disposable build (\`${{ steps.params.outputs.version }}\`) for PR #${{ github.event.pull_request.number }}. Replaced on every push, deleted when the PR closes. Not for production." \
            "$RUNNER_TEMP/dist/takaro-valheim-plugin.zip"

      - name: Comment PR build
        if: ${{ steps.params.outputs.publish == 'pr' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/comment-pr-build.sh valheim \
            "${{ github.event.pull_request.number }}" \
            "${{ steps.params.outputs.tag }}" \
            "${{ steps.params.outputs.version }}" \
            "$RUNNER_TEMP/dist/takaro-valheim-plugin.zip"

