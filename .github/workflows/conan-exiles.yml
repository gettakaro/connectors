name: Conan Exiles Connector

on:
  push:
    branches: [main]
    paths: ['conan-exiles/**', 'scripts/**', '.github/workflows/conan-exiles.yml']
  pull_request:
    paths: ['conan-exiles/**', 'scripts/**', '.github/workflows/conan-exiles.yml']
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: ${{ !inputs.tag }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: conan-exiles
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: conan-exiles/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Generate token
        id: app-token
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.TAKARO_CI_APP_ID }}
          private-key: ${{ secrets.TAKARO_CI_APP_PRIV_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: conan-exiles/package-lock.json

      - name: Make scripts executable
        run: chmod +x conan-exiles/scripts/*.sh scripts/*.sh

      - name: Resolve release params
        id: params
        env:
          EVENT: ${{ github.event_name }}
          IN_VERSION: ${{ inputs.version }}
          IN_TAG: ${{ inputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEV_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/release-params.sh conan-exiles >> "$GITHUB_OUTPUT"

      - name: Build release artifact
        run: conan-exiles/scripts/build-release.sh "${{ steps.params.outputs.version }}" "$RUNNER_TEMP/dist"

      - name: Publish stable release assets
        if: ${{ steps.params.outputs.publish == 'stable' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/publish-release.sh upload "${{ steps.params.outputs.tag }}" "$RUNNER_TEMP/dist/takaro-conan-exiles-bridge.zip"

      - name: Publish rolling dev build
        if: ${{ steps.params.outputs.publish == 'rolling' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/publish-release.sh rolling conan-exiles-dev \
            "Conan Exiles Connector - latest dev build" \
            "Rolling development build (\`${{ steps.params.outputs.version }}\`), updated on every push to main. Not for production." \
            "$RUNNER_TEMP/dist/takaro-conan-exiles-bridge.zip"

      - name: Publish PR build
        if: ${{ steps.params.outputs.publish == 'pr' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/publish-release.sh rolling "${{ steps.params.outputs.tag }}" \
            "Conan Exiles Connector - build for PR #${{ github.event.pull_request.number }}" \
            "Disposable build (\`${{ steps.params.outputs.version }}\`) for PR #${{ github.event.pull_request.number }}. Replaced on every push, deleted when the PR closes. Not for production." \
            "$RUNNER_TEMP/dist/takaro-conan-exiles-bridge.zip"

      - name: Comment PR build
        if: ${{ steps.params.outputs.publish == 'pr' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/comment-pr-build.sh conan-exiles \
            "${{ github.event.pull_request.number }}" \
            "${{ steps.params.outputs.tag }}" \
            "${{ steps.params.outputs.version }}" \
            "$RUNNER_TEMP/dist/takaro-conan-exiles-bridge.zip"
