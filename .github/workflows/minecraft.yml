name: Minecraft Connector

on:
  push:
    branches: [main]
    paths: ['minecraft/**', 'scripts/**', '.github/workflows/minecraft.yml']
  pull_request:
    paths: ['minecraft/**', 'scripts/**', '.github/workflows/minecraft.yml']
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

# Serialize same-ref runs so consecutive main pushes don't race on the rolling
# minecraft-dev release. Release runs (caller's workflow name) are in a different group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # All release/comment operations act as takaro-ci-bot[bot] (not github-actions[bot]).
      # Skipped on fork PRs, which can't access the App secrets and don't publish builds.
      - name: Generate token
        id: app-token
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TAKARO_CI_APP_ID }}
          private-key: ${{ secrets.TAKARO_CI_APP_PRIV_KEY }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Resolve release params
        id: params
        env:
          EVENT: ${{ github.event_name }}
          IN_VERSION: ${{ inputs.version }}
          IN_TAG: ${{ inputs.tag }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEV_SHA: ${{ github.event.pull_request.head.sha }}
        run: scripts/release-params.sh minecraft >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: minecraft/scripts/build-release.sh "${{ steps.params.outputs.version }}" "$RUNNER_TEMP/dist"

      - name: Publish stable release assets
        if: ${{ steps.params.outputs.publish == 'stable' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: scripts/publish-release.sh upload "${{ steps.params.outputs.tag }}" "$RUNNER_TEMP"/dist/*.jar

      - name: Publish rolling dev build
        if: ${{ steps.params.outputs.publish == 'rolling' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/publish-release.sh rolling minecraft-dev \
            "Minecraft Connector — latest dev build" \
            "Rolling development build (\`${{ steps.params.outputs.version }}\`), updated on every push to main. Not for production." \
            "$RUNNER_TEMP"/dist/*.jar

      # Fork PRs get a read-only token, so they can't publish a release or comment;
      # they build for validation only (no downloadable artifact — accepted limitation).
      - name: Publish PR build
        if: ${{ steps.params.outputs.publish == 'pr' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/publish-release.sh rolling "${{ steps.params.outputs.tag }}" \
            "Minecraft Connector — build for PR #${{ github.event.pull_request.number }}" \
            "Disposable build (\`${{ steps.params.outputs.version }}\`) for PR #${{ github.event.pull_request.number }}. Replaced on every push, deleted when the PR closes. Not for production." \
            "$RUNNER_TEMP"/dist/*.jar

      - name: Comment PR build
        if: ${{ steps.params.outputs.publish == 'pr' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          scripts/comment-pr-build.sh minecraft \
            "${{ github.event.pull_request.number }}" \
            "${{ steps.params.outputs.tag }}" \
            "${{ steps.params.outputs.version }}" \
            "$RUNNER_TEMP"/dist/*.jar
