name: Minecraft Connector

on:
  push:
    branches: [main]
    paths: ['minecraft/**', 'scripts/**', '.github/workflows/minecraft.yml']
  pull_request:
    paths: ['minecraft/**', 'scripts/**', '.github/workflows/minecraft.yml']
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string

# Serialize same-ref runs so consecutive main pushes don't race on the rolling
# minecraft-dev release. Release runs (caller's workflow name) are in a different group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Resolve release params
        id: params
        env:
          EVENT: ${{ github.event_name }}
          IN_VERSION: ${{ inputs.version }}
          IN_TAG: ${{ inputs.tag }}
        run: scripts/release-params.sh minecraft >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: minecraft/scripts/build-release.sh "${{ steps.params.outputs.version }}" "$RUNNER_TEMP/dist"

      - name: Publish stable release assets
        if: ${{ steps.params.outputs.publish == 'stable' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/publish-release.sh upload "${{ steps.params.outputs.tag }}" "$RUNNER_TEMP"/dist/*.jar

      - name: Publish rolling dev build
        if: ${{ steps.params.outputs.publish == 'rolling' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          scripts/publish-release.sh rolling minecraft-dev \
            "Minecraft Connector — latest dev build" \
            "Rolling development build (\`${{ steps.params.outputs.version }}\`), updated on every push to main. Not for production." \
            "$RUNNER_TEMP"/dist/*.jar

      - name: Upload PR build artifacts
        if: ${{ steps.params.outputs.publish == 'none' }}
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-jars
          path: ${{ runner.temp }}/dist/*.jar
          if-no-files-found: error
