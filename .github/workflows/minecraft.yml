name: Minecraft Connector

on:
  push:
    branches: [main]
    paths: ['minecraft/**']
    tags: ['minecraft-v*']
  pull_request:
    paths: ['minecraft/**']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minecraft

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build and test
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/minecraft-v* ]]; then
            VERSION="${GITHUB_REF_NAME#minecraft-v}"
            ./gradlew build -Pversion="${VERSION}"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            SHORT_SHA="${GITHUB_SHA::7}"
            ./gradlew build -Pversion="SNAPSHOT-${SHORT_SHA}"
          else
            ./gradlew build
          fi

      - name: Upload Paper JAR
        uses: actions/upload-artifact@v4
        with:
          name: paper-plugin
          path: minecraft/paper/build/libs/takaro-paper-*.jar
          if-no-files-found: error

      - name: Upload NeoForge JAR
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-mod
          path: minecraft/neoforge/build/libs/takaro-neoforge-*.jar
          if-no-files-found: error

      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: fabric-mod
          path: |
            minecraft/fabric/build/libs/takaro-fabric-*.jar
            !minecraft/fabric/build/libs/*-dev-shadow*
          if-no-files-found: error

  release:
    needs: build
    if: >
      startsWith(github.ref, 'refs/tags/minecraft-v') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set release info
        id: release_info
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/minecraft-v* ]]; then
            VERSION="${GITHUB_REF_NAME#minecraft-v}"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=Minecraft Connector v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            DATE=$(date -u +%Y-%m-%d)
            echo "tag_name=minecraft-pre-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "release_name=Minecraft Connector pre-release ${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          files: |
            paper-plugin/*.jar
            neoforge-mod/*.jar
            fabric-mod/*.jar
          generate_release_notes: true
