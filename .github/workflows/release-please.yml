name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      rust_released: ${{ steps.rp.outputs['rust--release_created'] }}
      rust_tag: ${{ steps.rp.outputs['rust--tag_name'] }}
      rust_version: ${{ steps.rp.outputs['rust--version'] }}
      minecraft_released: ${{ steps.rp.outputs['minecraft--release_created'] }}
      minecraft_tag: ${{ steps.rp.outputs['minecraft--tag_name'] }}
      minecraft_version: ${{ steps.rp.outputs['minecraft--version'] }}
      sevend2d_released: ${{ steps.rp.outputs['7d2d--release_created'] }}
      sevend2d_tag: ${{ steps.rp.outputs['7d2d--tag_name'] }}
      sevend2d_version: ${{ steps.rp.outputs['7d2d--version'] }}
      valheim_released: ${{ steps.rp.outputs['valheim--release_created'] }}
      valheim_tag: ${{ steps.rp.outputs['valheim--tag_name'] }}
      valheim_version: ${{ steps.rp.outputs['valheim--version'] }}
    steps:
      # Author Release PRs as takaro-ci-bot[bot] instead of GITHUB_TOKEN. PRs/commits made
      # with GITHUB_TOKEN don't fire downstream events, so the required `conventional-title`
      # check never ran on Release PRs and they couldn't merge. An App token triggers it.
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.TAKARO_CI_APP_ID }}
          private-key: ${{ secrets.TAKARO_CI_APP_PRIV_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a connector's Release PR is merged, release-please creates its tag + GitHub
  # Release; these jobs build the artifacts and attach them to that release in the
  # same run (no cross-workflow tag trigger needed — sidesteps the GITHUB_TOKEN trap).
  release-rust:
    needs: release-please
    if: ${{ needs.release-please.outputs.rust_released == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/rust.yml
    secrets: inherit
    with:
      version: ${{ needs.release-please.outputs.rust_version }}
      tag: ${{ needs.release-please.outputs.rust_tag }}

  release-minecraft:
    needs: release-please
    if: ${{ needs.release-please.outputs.minecraft_released == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/minecraft.yml
    secrets: inherit
    with:
      version: ${{ needs.release-please.outputs.minecraft_version }}
      tag: ${{ needs.release-please.outputs.minecraft_tag }}

  release-7d2d:
    needs: release-please
    if: ${{ needs.release-please.outputs.sevend2d_released == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/7d2d.yml
    secrets: inherit
    with:
      version: ${{ needs.release-please.outputs.sevend2d_version }}
      tag: ${{ needs.release-please.outputs.sevend2d_tag }}

  release-valheim:
    needs: release-please
    if: ${{ needs.release-please.outputs.valheim_released == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/valheim.yml
    secrets: inherit
    with:
      version: ${{ needs.release-please.outputs.valheim_version }}
      tag: ${{ needs.release-please.outputs.valheim_tag }}
